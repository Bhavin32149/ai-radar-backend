name: Commit AI News Archive

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run commit pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node commit.js

      - name: Deploy data to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token:  ${{ secrets.GITHUB_TOKEN }}
          publish_dir:   ./data
          publish_branch: gh-pages
          commit_message: "data: update AI news archive"
          force_orphan:  false
          keep_files:    true

      - name: Commit cleared buffer back to main
        run: |
          git config user.name  "AI Radar Bot"
          git config user.email "bot@ai-radar.dev"
          git add data/buffer.json
          git diff --staged --quiet || git commit -m "chore: clear buffer after commit [skip ci]"
          git push
